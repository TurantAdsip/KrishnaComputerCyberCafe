<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="description" content="Latest Government Exams, Results, Admit Card, Current Affairs and Jobs">
    <meta name="keywords" content="Government Jobs, SSC, UPSC, Railway, Result, Admit Card">
    <meta name="author" content="Exam Portal">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="./Assets/Logo.png">

</head>

<body>
    <!-- Header and navbar -->
    <div id="header"></div>

    <div class="container">

        <h1>Admin Dashboard</h1>

        <form id="postForm">

            <input type="text" id="title" placeholder="Title" required>

            <select id="category">

                <option>Latest Exam</option>

                <option>Current Affairs</option>

                <option>Result</option>

                <option>Admit Card</option>

            </select>

            <input type="date" id="date">

            <textarea id="description" placeholder="Description"></textarea>

            <input type="text" id="image" placeholder="Image URL">

            <input type="text" id="pdf" placeholder="PDF Link">

            <input type="text" id="apply" placeholder="Apply Link">

            <button type="submit">

                Publish

            </button>

        </form>

    </div>

    <!-- footer -->
    <div id="footer"></div>

    <script src="..js/dashboard.js"></script>
    <script src="../js/include.js"></script>

</body>

</html>
